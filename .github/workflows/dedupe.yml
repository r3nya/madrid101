name: npm dedupe

on:
  workflow_dispatch:
  schedule:
    # 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: 22

concurrency:
  group: npm-dedupe

jobs:
  dedupe:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate lockfile (frozen, no scripts)
        run: npm ci --ignore-scripts

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run npm dedupe
        run: npm dedupe

      - name: Re-validate lockfile after dedupe
        run: npm ci --ignore-scripts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Force-push branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          git checkout -B chore/npm-dedupe
          git add package-lock.json
          git commit -m "chore(deps): npm dedupe

          Automated monthly dedupe of package-lock.json."
          git push --force origin chore/npm-dedupe

      - name: Open or update PR
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const branch = 'chore/npm-dedupe';
            const head = `${context.repo.owner}:${branch}`;
            const body = 'Automated monthly `npm dedupe`.\n\nGenerated by `.github/workflows/dedupe.yml`.';

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head,
              base: 'main',
              state: 'open',
            });

            if (prs.length > 0) {
              core.info(`PR #${prs[0].number} already exists and was updated by the force-push.`);
              return;
            }

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: branch,
                base: 'main',
                title: 'chore(deps): npm dedupe',
                body,
              });
              core.info(`Created PR #${pr.number}: ${pr.html_url}`);
            } catch (error) {
              if (error.status === 403) {
                core.warning(
                  'Could not create PR because GitHub Actions is not permitted to create pull requests. ' +
                    'Enable Settings → Actions → General → Workflow permissions → "Allow GitHub Actions to create and approve pull requests", ' +
                    `or open it manually from branch ${branch}.`
                );
                core.notice(`Dedupe branch was pushed: https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${branch}`);
                return;
              }
              throw error;
            }
