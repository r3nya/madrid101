# Dependabot configuration for supply-chain security with grouped updates
# Documentation: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Madrid"
      time: "09:00"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    cooldown:
      default-days: 14
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 7
      include:
        - "*"
    # Groups for version updates - security updates create individual PRs automatically
    groups:
      # Production dependencies (all except astro-related)
      prod-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
        exclude-patterns:
          - "astro"
          - "@astrojs/*"
          - "astro-*"
          - "starlight-*"
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
      # Astro ecosystem - separate for careful testing
      astro-and-starlight:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "astro-*"
          - "starlight-*"
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
      # Development dependencies
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    assignees:
      - "r3nya"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      timezone: "Europe/Madrid"
      time: "09:00"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
    cooldown:
      default-days: 14
      include:
        - "*"
    groups:
      github-actions:
        patterns:
          - "*"
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
    assignees:
      - "r3nya"
